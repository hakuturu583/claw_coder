services:
  skill-hub:
    build:
      context: .
      dockerfile: docker/skill-hub.Dockerfile
    image: nemoclaw:skill-hub
    pull_policy: build
    restart: unless-stopped
    working_dir: /skill-hub
    command: ["/bin/sh", "-lc", "trap : TERM INT; sleep infinity & wait"]
    volumes:
      - skill-hub-data:/skill-hub
    networks:
      - skill-hub-internal

  nemoclaw:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BASE_IMAGE: ${NEMOCLAW_IMAGE:-ubuntu:24.04}
    image: nemoclaw:local
    pull_policy: build
    restart: unless-stopped
    entrypoint: ["/usr/bin/tini", "-s", "--", "/usr/local/bin/nemoclaw-entrypoint.sh"]
    working_dir: /home/nemoclaw/.openclaw/workspace
    depends_on:
      skill-hub:
        condition: service_completed_successfully
      embeddings:
        condition: service_started
    environment:
      HOME: /home/nemoclaw
      USER: nemoclaw
      LOGNAME: nemoclaw
      NEMOCLAW_CHARACTER_NAME: ${NEMOCLAW_CHARACTER_NAME:-Clawくん}
      NEMOCLAW_API_PORT: ${NEMOCLAW_API_PORT:-8000}
      NEMOCLAW_EMBEDDING_MODEL: ${NEMOCLAW_EMBEDDING_MODEL:-mradermacher/sarashina-embedding-v2-1b-GGUF:Q4_K_M}
      NEMOCLAW_EMBEDDING_API_PORT: ${NEMOCLAW_EMBEDDING_API_PORT:-8010}
      BRAVE_API_KEY: ${BRAVE_API_KEY:-}
      BRAVE_SEARCH_API_KEY: ${BRAVE_SEARCH_API_KEY:-}
      SLACK_BOT_TOKEN: ${SLACK_BOT_TOKEN:-}
      SLACK_APP_TOKEN: ${SLACK_APP_TOKEN:-}
      SLACK_CHANNEL_ID: ${SLACK_CHANNEL_ID:-}
      GH_TOKEN: ${GH_TOKEN:-}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
    volumes:
      - nemoclaw-home:/home/nemoclaw
      - nemoclaw-skills:/home/nemoclaw/.openclaw/skills
      - skill-hub-data:/opt/nemoclaw/skill-hub:ro
      - nemoclaw-data:/opt/nemoclaw
      - ./openclaw/AGENTS.md:/home/nemoclaw/.openclaw/workspace/AGENTS.md:ro
      - ./openclaw/AGENTS.md:/workspace/repositories/AGENTS.md:ro
      - ./repositories:/workspace/repositories

  model-init:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BASE_IMAGE: ${NEMOCLAW_IMAGE:-ubuntu:24.04}
    image: nemoclaw:local
    pull_policy: build
    restart: "no"
    entrypoint: ["/usr/bin/tini", "-s", "--", "/usr/local/bin/install-nemoclaw-inference.sh"]
    environment:
      NEMOCLAW_MODEL: ${NEMOCLAW_MODEL:-deepreinforce-ai/Ornith-1.0-35B-GGUF:Q4_K_M}
      NEMOCLAW_GGUF_FILE: ${NEMOCLAW_GGUF_FILE:-}
      NEMOCLAW_CHARACTER_NAME: ${NEMOCLAW_CHARACTER_NAME:-Clawくん}
      NEMOCLAW_API_HOST: ${NEMOCLAW_API_HOST:-0.0.0.0}
      NEMOCLAW_API_PORT: ${NEMOCLAW_API_PORT:-8000}
      NEMOCLAW_MAX_MODEL_LEN: ${NEMOCLAW_MAX_MODEL_LEN:-32768}
      NEMOCLAW_LLAMA_N_GPU_LAYERS: ${NEMOCLAW_LLAMA_N_GPU_LAYERS:-999}
      HF_TOKEN: ${HF_TOKEN:-}
      HUGGING_FACE_HUB_TOKEN: ${HUGGING_FACE_HUB_TOKEN:-}
    volumes:
      - nemoclaw-data:/opt/nemoclaw
      - nemoclaw-models:/var/lib/nemoclaw/models
      - nemoclaw-hf-cache:/var/lib/nemoclaw/huggingface

  embedding-model-init:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BASE_IMAGE: ${NEMOCLAW_IMAGE:-ubuntu:24.04}
    image: nemoclaw:local
    pull_policy: build
    restart: "no"
    entrypoint: ["/usr/bin/tini", "-s", "--", "/usr/local/bin/install-nemoclaw-embeddings.sh"]
    environment:
      NEMOCLAW_EMBEDDING_MODEL: ${NEMOCLAW_EMBEDDING_MODEL:-mradermacher/sarashina-embedding-v2-1b-GGUF:Q4_K_M}
      NEMOCLAW_EMBEDDING_GGUF_FILE: ${NEMOCLAW_EMBEDDING_GGUF_FILE:-}
      NEMOCLAW_EMBEDDING_API_HOST: ${NEMOCLAW_EMBEDDING_API_HOST:-0.0.0.0}
      NEMOCLAW_EMBEDDING_API_PORT: ${NEMOCLAW_EMBEDDING_API_PORT:-8010}
      NEMOCLAW_EMBEDDING_MAX_MODEL_LEN: ${NEMOCLAW_EMBEDDING_MAX_MODEL_LEN:-8192}
      NEMOCLAW_EMBEDDING_LLAMA_N_GPU_LAYERS: ${NEMOCLAW_EMBEDDING_LLAMA_N_GPU_LAYERS:-999}
    volumes:
      - nemoclaw-data:/opt/nemoclaw
      - nemoclaw-models:/var/lib/nemoclaw/models
      - nemoclaw-hf-cache:/var/lib/nemoclaw/huggingface

  embeddings:
    image: ${NEMOCLAW_LLAMA_IMAGE:-ghcr.io/ggml-org/llama.cpp:server-cuda12}
    pull_policy: missing
    restart: unless-stopped
    gpus: all
    entrypoint: ["/bin/sh", "/usr/local/bin/llama-embeddings-entrypoint.sh"]
    depends_on:
      embedding-model-init:
        condition: service_completed_successfully
    environment:
      NEMOCLAW_EMBEDDING_MODEL: ${NEMOCLAW_EMBEDDING_MODEL:-mradermacher/sarashina-embedding-v2-1b-GGUF:Q4_K_M}
      NEMOCLAW_EMBEDDING_API_HOST: ${NEMOCLAW_EMBEDDING_API_HOST:-0.0.0.0}
      NEMOCLAW_EMBEDDING_API_PORT: ${NEMOCLAW_EMBEDDING_API_PORT:-8010}
      NEMOCLAW_EMBEDDING_MAX_MODEL_LEN: ${NEMOCLAW_EMBEDDING_MAX_MODEL_LEN:-8192}
      NEMOCLAW_EMBEDDING_LLAMA_N_GPU_LAYERS: ${NEMOCLAW_EMBEDDING_LLAMA_N_GPU_LAYERS:-999}
    volumes:
      - nemoclaw-data:/opt/nemoclaw
      - nemoclaw-models:/var/lib/nemoclaw/models
      - nemoclaw-hf-cache:/var/lib/nemoclaw/huggingface
      - ./docker/llama-embeddings-entrypoint.sh:/usr/local/bin/llama-embeddings-entrypoint.sh:ro

  inference:
    image: ${NEMOCLAW_LLAMA_IMAGE:-ghcr.io/ggml-org/llama.cpp:server-cuda12}
    pull_policy: missing
    restart: unless-stopped
    gpus: all
    entrypoint: ["/bin/sh", "/usr/local/bin/llama-server-entrypoint.sh"]
    environment:
      NEMOCLAW_MODEL: ${NEMOCLAW_MODEL:-deepreinforce-ai/Ornith-1.0-35B-GGUF:Q4_K_M}
      NEMOCLAW_CHARACTER_NAME: ${NEMOCLAW_CHARACTER_NAME:-Clawくん}
      NEMOCLAW_API_HOST: ${NEMOCLAW_API_HOST:-0.0.0.0}
      NEMOCLAW_API_PORT: ${NEMOCLAW_API_PORT:-8000}
      NEMOCLAW_MAX_MODEL_LEN: ${NEMOCLAW_MAX_MODEL_LEN:-32768}
      NEMOCLAW_LLAMA_N_GPU_LAYERS: ${NEMOCLAW_LLAMA_N_GPU_LAYERS:-999}
    volumes:
      - nemoclaw-data:/opt/nemoclaw
      - nemoclaw-models:/var/lib/nemoclaw/models
      - nemoclaw-hf-cache:/var/lib/nemoclaw/huggingface
      - ./docker/llama-server-entrypoint.sh:/usr/local/bin/llama-server-entrypoint.sh:ro

volumes:
  skill-hub-data:
  nemoclaw-home:
  nemoclaw-skills:
  nemoclaw-data:
  nemoclaw-models:
  nemoclaw-hf-cache:

networks:
  skill-hub-internal:
    internal: true
