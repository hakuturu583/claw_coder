services:
  nemoclaw:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BASE_IMAGE: ${NEMOCLAW_IMAGE:-ubuntu:24.04}
    image: nemoclaw:local
    pull_policy: build
    restart: unless-stopped
    entrypoint: ["/usr/bin/tini", "-s", "--", "/usr/local/bin/nemoclaw-entrypoint.sh"]
    working_dir: /workspace/repositories
    environment:
      HOME: /home/nemoclaw
      USER: nemoclaw
      LOGNAME: nemoclaw
      NEMOCLAW_CHARACTER_NAME: ${NEMOCLAW_CHARACTER_NAME:-Clawくん}
      NEMOCLAW_API_PORT: ${NEMOCLAW_API_PORT:-8000}
      BRAVE_API_KEY: ${BRAVE_API_KEY:-}
      BRAVE_SEARCH_API_KEY: ${BRAVE_SEARCH_API_KEY:-}
      SLACK_BOT_TOKEN: ${SLACK_BOT_TOKEN:-}
      SLACK_APP_TOKEN: ${SLACK_APP_TOKEN:-}
      SLACK_CHANNEL_ID: ${SLACK_CHANNEL_ID:-}
      GH_TOKEN: ${GH_TOKEN:-}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
    volumes:
      - nemoclaw-home:/home/nemoclaw
      - nemoclaw-skills:/home/nemoclaw/.openclaw/skills
      - nemoclaw-data:/opt/nemoclaw
      - ./repositories:/workspace/repositories

  model-init:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BASE_IMAGE: ${NEMOCLAW_IMAGE:-ubuntu:24.04}
    image: nemoclaw:local
    pull_policy: build
    restart: "no"
    entrypoint: ["/usr/bin/tini", "-s", "--", "/usr/local/bin/install-nemoclaw-inference.sh"]
    environment:
      NEMOCLAW_MODEL: ${NEMOCLAW_MODEL:-deepreinforce-ai/Ornith-1.0-35B-GGUF:Q4_K_M}
      NEMOCLAW_GGUF_FILE: ${NEMOCLAW_GGUF_FILE:-}
      NEMOCLAW_CHARACTER_NAME: ${NEMOCLAW_CHARACTER_NAME:-Clawくん}
      NEMOCLAW_API_HOST: ${NEMOCLAW_API_HOST:-0.0.0.0}
      NEMOCLAW_API_PORT: ${NEMOCLAW_API_PORT:-8000}
      NEMOCLAW_MAX_MODEL_LEN: ${NEMOCLAW_MAX_MODEL_LEN:-32768}
      NEMOCLAW_LLAMA_N_GPU_LAYERS: ${NEMOCLAW_LLAMA_N_GPU_LAYERS:-999}
      HF_TOKEN: ${HF_TOKEN:-}
      HUGGING_FACE_HUB_TOKEN: ${HUGGING_FACE_HUB_TOKEN:-}
    volumes:
      - nemoclaw-data:/opt/nemoclaw
      - nemoclaw-models:/var/lib/nemoclaw/models
      - nemoclaw-hf-cache:/var/lib/nemoclaw/huggingface

  inference:
    image: ${NEMOCLAW_LLAMA_IMAGE:-ghcr.io/ggml-org/llama.cpp:server-cuda}
    pull_policy: missing
    restart: unless-stopped
    gpus: all
    entrypoint: ["/bin/sh", "/usr/local/bin/llama-server-entrypoint.sh"]
    environment:
      NEMOCLAW_MODEL: ${NEMOCLAW_MODEL:-deepreinforce-ai/Ornith-1.0-35B-GGUF:Q4_K_M}
      NEMOCLAW_CHARACTER_NAME: ${NEMOCLAW_CHARACTER_NAME:-Clawくん}
      NEMOCLAW_API_HOST: ${NEMOCLAW_API_HOST:-0.0.0.0}
      NEMOCLAW_API_PORT: ${NEMOCLAW_API_PORT:-8000}
      NEMOCLAW_MAX_MODEL_LEN: ${NEMOCLAW_MAX_MODEL_LEN:-32768}
      NEMOCLAW_LLAMA_N_GPU_LAYERS: ${NEMOCLAW_LLAMA_N_GPU_LAYERS:-999}
    volumes:
      - nemoclaw-data:/opt/nemoclaw
      - nemoclaw-models:/var/lib/nemoclaw/models
      - nemoclaw-hf-cache:/var/lib/nemoclaw/huggingface
      - ./docker/llama-server-entrypoint.sh:/usr/local/bin/llama-server-entrypoint.sh:ro

volumes:
  nemoclaw-home:
  nemoclaw-skills:
  nemoclaw-data:
  nemoclaw-models:
  nemoclaw-hf-cache:
