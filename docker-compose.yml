services:
  nemoclaw:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BASE_IMAGE: ${NEMOCLAW_IMAGE:-ubuntu:24.04}
    image: nemoclaw:local
    restart: unless-stopped
    environment:
      NEMOCLAW_MODEL: ${NEMOCLAW_MODEL:-deepreinforce-ai/Ornith-1.0-35B-GGUF:Q4_K_M}
      NEMOCLAW_TOKENIZER: ${NEMOCLAW_TOKENIZER:-deepreinforce-ai/Ornith-1.0-35B-GGUF}
      NEMOCLAW_HF_CONFIG_PATH: ${NEMOCLAW_HF_CONFIG_PATH:-deepreinforce-ai/Ornith-1.0-35B-GGUF}
      NEMOCLAW_HF_OVERRIDES: ${NEMOCLAW_HF_OVERRIDES:-}
      NEMOCLAW_GGUF_FILE: ${NEMOCLAW_GGUF_FILE:-}
      NEMOCLAW_API_HOST: ${NEMOCLAW_API_HOST:-0.0.0.0}
      NEMOCLAW_API_PORT: ${NEMOCLAW_API_PORT:-8000}
      NEMOCLAW_MAX_MODEL_LEN: ${NEMOCLAW_MAX_MODEL_LEN:-32768}
      NEMOCLAW_CUDA_VARIANT: ${NEMOCLAW_CUDA_VARIANT:-cu130}
      NEMOCLAW_LLAMA_CPP_TAG: ${NEMOCLAW_LLAMA_CPP_TAG:-b9803}
      NEMOCLAW_LLAMA_N_GPU_LAYERS: ${NEMOCLAW_LLAMA_N_GPU_LAYERS:-999}
      NEMOCLAW_ALLOW_UNSUPPORTED_DRIVER: ${NEMOCLAW_ALLOW_UNSUPPORTED_DRIVER:-0}
      NEMOCLAW_HOST_CUDA_VERSION: ${NEMOCLAW_HOST_CUDA_VERSION:-}
      HOME: /home/nemoclaw
      USER: nemoclaw
      LOGNAME: nemoclaw
    volumes:
      - nemoclaw-home:/home/nemoclaw
      - nemoclaw-data:/opt/nemoclaw
      - nemoclaw-skills:/opt/nemoclaw/skills
      - nemoclaw-models:/var/lib/nemoclaw/models
      - nemoclaw-hf-cache:/var/lib/nemoclaw/huggingface

volumes:
  nemoclaw-home:
  nemoclaw-data:
  nemoclaw-skills:
  nemoclaw-models:
  nemoclaw-hf-cache:
